<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SchoolScore Finder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 18px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.score {
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>SchoolScore Finder</h1>
    <p>Find schools based on real performance — no guessing</p>
</header>

<div class="container">

    <div class="search-box">
        <input id="search" placeholder="Search district (e.g. Pretoria)" />
        <button onclick="search()">Search</button>
    </div>

    <div id="results"></div>

</div>

<script>
const schools = [
    { name: "Pretoria High School", district: "Pretoria", pass: 92 },
    { name: "Soweto Secondary", district: "Soweto", pass: 85 },
    { name: "Centurion College", district: "Pretoria", pass: 96 },
    { name: "Joburg High", district: "Johannesburg", pass: 88 }
];

function show(data) {
    const results = document.getElementById("results");
    results.innerHTML = "";

    data.forEach(s => {
        results.innerHTML += `
            <div class="card">
                <h3>${s.name}</h3>
                <p>District: ${s.district}</p>
                <p class="score">Pass Rate: ${s.pass}%</p>
            </div>
        `;
    });
}

function search() {
    const value = document.getElementById("search").value.toLowerCase();

    const filtered = schools.filter(s =>
        s.district.toLowerCase().includes(value)
    );

    show(filtered);
}

// load all schools first
show(schools);
</script>

</body>
</html>
