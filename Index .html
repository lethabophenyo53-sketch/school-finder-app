<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SchoolScore Finder</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f9;
    }

    header {
        background: #1e3a8a;
        color: white;
        padding: 20px;
        text-align: center;
    }

    .container {
        padding: 20px;
        max-width: 900px;
        margin: auto;
    }

    .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    button {
        padding: 12px 20px;
        background: #1e3a8a;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .school-card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .score {
        font-size: 18px;
        font-weight: bold;
        color: green;
    }

    .rank {
        font-size: 14px;
        color: gray;
    }

</style>
</head>

<body>

<header>
    <h1>SchoolScore Finder</h1>
    <p>Find schools based on real performance — no guessing</p>
</header>

<div class="container">

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search district (e.g. Pretoria, Soweto)" />
        <button onclick="searchSchools()">Search</button>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

</div>

<script>
const schools = [
    { name: "Pretoria High School", district: "Pretoria", pass: 92, rank: 1 },
    { name: "Soweto Secondary School", district: "Soweto", pass: 85, rank: 2 },
    { name: "Centurion Academy", district: "Pretoria", pass: 96, rank: 1 },
    { name: "Johannesburg High", district: "Johannesburg", pass: 88, rank: 3 },
];

function displaySchools(list) {
    const results = document.getElementById("results");
    results.innerHTML = "";

    list.forEach(school => {
        results.innerHTML += `
            <div class="school-card">
                <h3>${school.name}</h3>
                <p class="rank">District: ${school.district} | Rank: #${school.rank}</p>
                <p class="score">Pass Rate: ${school.pass}%</p>
            </div>
        `;
    });
}

function searchSchools() {
    const input = document.getElementById("searchInput").value.toLowerCase();

    const filtered = schools.filter(school =>
        school.district.toLowerCase().includes(input)
    );

    displaySchools(filtered);
}

// show all on load
displaySchools(schools);
</script>

</body>
</html>
